<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UEC Result Verification</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{margin:0;background:#2f528f;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;}
.card{background:#eee;width:500px;border-radius:12px;padding:30px;text-align:center;}
.logo{width:90px;margin-bottom:10px;}
table{border-collapse:collapse;margin:10px auto;width:90%;}
table,th,td{border:1px solid #ddd;padding:8px;text-align:center;}
th{background-color:#4e81bd;color:white;}
.footer{margin-top:30px;color:white;font-size:14px;text-align:center;}
</style>
</head>
<body>
<div class="card">
<img src="logo.png" class="logo">
<h2>Result Verification</h2>
<p id="result"></p>
</div>

<div class="footer">
Designed by UEC ICT Department<br>
© 2026 University of East Capital
</div>

<script>
const API = window.location.origin + '/api';
const params = new URLSearchParams(window.location.search);
const id = params.get('id');

if (id) {
  fetch(API + '/verify/' + id)
    .then(res => res.json())
    .then(data => {
      if (data.error) {
        document.getElementById('result').innerHTML = 'Result not found';
        return;
      }

      let html = '<b>Name:</b> ' + data.name + '<br>';
      html += '<b>ID:</b> ' + data.id + '<br><br>';
      html += '<b>Results:</b><br>';
      html += '<table><tr><th>Course</th><th>Grade</th></tr>';

      for (const [course, grade] of Object.entries(data.courses)) {
        html += '<tr><td>' + course + '</td><td>' + grade + '</td></tr>';
      }

      html += '<tr><td><b>GPA</b></td><td><b>' + data.gpa + '</b></td></tr>';
      html += '</table><br><b>Status:</b> Verified ✔';

      document.getElementById('result').innerHTML = html;
    })
    .catch(err => {
      document.getElementById('result').innerHTML = 'Error connecting to server';
      console.error(err);
    });
} else {
  document.getElementById('result').innerHTML = 'No ID provided';
}
</script>
</body>
</html>
