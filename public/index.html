<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UEC Student Result Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{margin:0;background:#2f528f;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;}
.card{background:#eee;width:500px;border-radius:12px;padding:30px;text-align:center;}
.logo{width:90px;margin-bottom:10px;}
input{width:100%;padding:12px;margin:8px 0;border-radius:6px;border:1px solid #ccc;}
button{width:100%;padding:12px;margin-top:10px;background:#345a9d;border:none;color:white;border-radius:6px;cursor:pointer;font-size:15px;}
button:hover{background:#274a86;}
.logout{background:#777;}
.appeal{background:#d35400;}
.appeal:hover{background:#b84300;}
.studentPhoto{width:120px;height:120px;border-radius:50%;margin:auto;display:block;}
table{width:100%;border-collapse:collapse;margin-top:20px;}
th{background:#4e81bd;color:white;padding:10px;}
td{padding:10px;border:1px solid #ddd;}
.footer{margin-top:30px;color:white;font-size:14px;text-align:center;}
</style>
</head>
<body>

<div class="card" id="loginBox">
<img src="logo.png" class="logo">
<h2>🎓 University of East Capital</h2>
<p>Student Result Portal</p>
<input id="id" placeholder="Student ID">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div class="card" id="firstLoginBox" style="display:none">
<img src="logo.png" class="logo">
<h2>Welcome to UEC Result Portal</h2>
<p>Please set your new password</p>
<input id="newPass" type="password" placeholder="New Password">
<input id="confirmPass" type="password" placeholder="Confirm Password">
<button onclick="submitNewPassword()">Submit</button>
</div>

<div class="card" id="loadingBox" style="display:none">
<h3>Loading your data...</h3>
</div>

<div class="card" id="resultBox" style="display:none">
<img id="photo" class="studentPhoto">
<h3 id="name"></h3>
<p id="sid"></p>
<table id="resultTable">
<tr><th>Course</th><th>Grade</th></tr>
</table>
<h3>GPA : <span id="gpa"></span></h3>
<button onclick="downloadPDF()">Download Official Result</button>
<button class="appeal" onclick="openAppeal()">Submit Appeal</button>
<button onclick="openChangePassword()">Change Password</button>
<button class="logout" onclick="logout()">Logout</button>
<p style="margin-top:15px;font-size:13px;color:#555"> BL = Failed bylaw (Failed in the written Exam) </p>
</div>

<div class="footer">
Designed by UEC ICT Department<br>
© 2026 University of East Capital
</div>

<div id="cpModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;justify-content:center;align-items:center;">
<div style="background:white;padding:25px;border-radius:10px;width:380px;text-align:center;">
<h3 style="margin-top:0;color:#345a9d;">Change Password</h3>
<input id="cpNew" type="password" placeholder="New Password" style="width:100%;padding:10px;margin:6px 0;border-radius:6px;border:1px solid #ccc;">
<input id="cpConfirm" type="password" placeholder="Confirm New Password" style="width:100%;padding:10px;margin:6px 0;border-radius:6px;border:1px solid #ccc;">
<div style="margin-top:12px;">
<button onclick="changePassword()" style="padding:10px 18px;background:#345a9d;color:white;border:none;border-radius:6px;cursor:pointer;">Save</button>
<button onclick="closeChangePassword()" style="padding:10px 18px;background:#777;color:white;border:none;border-radius:6px;cursor:pointer;margin-left:8px;">Cancel</button>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.4/dist/jspdf.plugin.autotable.min.js"></script>
<script>
const API = window.location.origin + '/api';
let currentStudent = null;
let token = localStorage.getItem('resultToken');

if (!token) { location.href = 'login.html'; }

if (token) {
  if (localStorage.getItem('firstLogin') === '1') {
    localStorage.removeItem('firstLogin');
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('loadingBox').style.display = 'none';
    showFirstLoginCard();
  } else {
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('loadingBox').style.display = 'block';
    loadResults();
  }
}

async function login() {
  const id = document.getElementById('id').value.trim();
  const pass = document.getElementById('pass').value;

  document.getElementById('loginBox').style.display = 'none';
  document.getElementById('loadingBox').style.display = 'block';

  try {
    const res = await fetch(API + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, password: pass })
    });

    const data = await res.json();
    document.getElementById('loadingBox').style.display = 'none';

    if (res.ok) {
      token = data.token;
      localStorage.setItem('resultToken', token);
      localStorage.setItem('student', JSON.stringify(data.student));
      currentStudent = data.student;

      if (data.student.firstLogin) {
        showFirstLoginCard(data.student.id);
      } else {
        loadResults();
      }
    } else {
      alert(data.error || 'Invalid ID or Password');
      document.getElementById('loginBox').style.display = 'block';
    }
  } catch (err) {
    alert('The results are not yet released. Please check back later');
    document.getElementById('loginBox').style.display = 'block';
  }
}

function showFirstLoginCard(studentId) {
  document.getElementById('firstLoginBox').style.display = 'block';
  document.getElementById('loginBox').style.display = 'none';
  document.getElementById('resultBox').style.display = 'none';
}

async function submitNewPassword() {
  const newPass = document.getElementById('newPass').value.trim();
  const confirmPass = document.getElementById('confirmPass').value.trim();
  if (newPass === '' || confirmPass === '') { alert('Password fields cannot be empty'); return; }
  if (newPass !== confirmPass) { alert('Passwords do not match!'); return; }
  if (newPass.length < 4) { alert('Password must be at least 4 characters'); return; }

  try {
    const res = await fetch(API + '/auth/change-password', {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      },
      body: JSON.stringify({ newPassword: newPass })
    });

    const data = await res.json();
    if (res.ok) {
      alert('Password updated successfully. Please login again.');
      localStorage.clear();
      location.href = 'login.html';
    } else {
      alert(data.error || 'Error updating password. Try again.');
    }
  } catch (err) {
    alert('Error updating password');
  }
}

async function loadResults() {
  try {
    const res = await fetch(API + '/student/results', {
      headers: { 'Authorization': 'Bearer ' + token }
    });

    if (!res.ok) {
      localStorage.removeItem('resultToken');
      localStorage.removeItem('student');
      location.href = 'login.html';
      return;
    }

    const data = await res.json();
    currentStudent = data;

    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('loadingBox').style.display = 'none';
    document.getElementById('resultBox').style.display = 'block';
    document.getElementById('name').innerText = data.name;
    document.getElementById('sid').innerText = 'Student ID: ' + data.id;
    document.getElementById('gpa').innerText = data.gpa;

    const photo = document.getElementById('photo');
    photo.src = 'https://amrattiaewais69-gif.github.io/student-results/photos/' + data.id + '.jpg';
    photo.onerror = function() { this.src = 'default-avatar.svg'; };

    const table = document.getElementById('resultTable');
    table.innerHTML = '<tr><th>Course</th><th>Grade</th></tr>';
    for (const [course, grade] of Object.entries(data.courses)) {
      table.innerHTML += '<tr><td>' + course + '</td><td>' + grade + '</td></tr>';
    }
  } catch (err) {
    alert('Error loading results');
  }
}

function openAppeal() { window.location = 'appeal.html'; }
function logout() { localStorage.clear(); location.href = 'login.html'; }
function openChangePassword() { document.getElementById('cpModal').style.display = 'flex'; }
function closeChangePassword() { document.getElementById('cpModal').style.display = 'none'; }

async function changePassword() {
  const newPass = document.getElementById('cpNew').value.trim();
  const confirmPass = document.getElementById('cpConfirm').value.trim();
  if (!newPass || !confirmPass) { alert('Fill in all fields'); return; }
  if (newPass !== confirmPass) { alert('Passwords do not match'); return; }
  if (newPass.length < 4) { alert('Password must be at least 4 characters'); return; }

  try {
    const res = await fetch(API + '/auth/change-password', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ newPassword: newPass })
    });
    const data = await res.json();
    if (res.ok) {
      alert('Password updated. Please login again.');
      localStorage.clear();
      location.href = 'login.html';
    } else {
      alert(data.error || 'Failed');
    }
  } catch (err) { alert('Error'); }
}

async function downloadPDF() {
  if (!currentStudent) {
    alert('Session expired. Please login again.');
    logout();
    return;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const logoUrl = 'logo.png';
  const logoRes = await fetch(logoUrl);
  const logoBlob = await logoRes.blob();
  const logoReader = new FileReader();

  logoReader.onloadend = async function() {
    doc.addImage(logoReader.result, 'PNG', 15, 10, 30, 30);

    doc.setFont('helvetica', 'bold');
    doc.setFontSize(22);
    doc.setTextColor(0, 51, 102);
    doc.text('University of East Capital', 105, 25, { align: 'center' });

    doc.setFontSize(16);
    doc.setTextColor(0, 0, 0);
    doc.text('MidTerm Result-Semester 2', 105, 35, { align: 'center' });

    doc.setFontSize(12);
    doc.setFont('helvetica', 'bold');
    doc.text('Student Name:', 20, 55);
    doc.text('Student ID:', 20, 65);

    doc.setFont('helvetica', 'normal');
    doc.text(currentStudent.name, 60, 55);
    doc.text(currentStudent.id, 60, 65);

    const imgUrl = 'https://amrattiaewais69-gif.github.io/student-results/photos/' + currentStudent.id + '.jpg';

    try {
      const imgRes = await fetch(imgUrl);
      const imgBlob = await imgRes.blob();
      const reader = new FileReader();

      reader.onloadend = function() {
        doc.addImage(reader.result, 'JPEG', 160, 50, 30, 35);
        drawTable();
      };

      reader.readAsDataURL(imgBlob);
    } catch (e) {
      drawTable();
    }

    function drawTable() {
      const body = [];
      for (const [course, grade] of Object.entries(currentStudent.courses)) {
        body.push([course, grade]);
      }
      body.push(['GPA', currentStudent.gpa]);

      doc.autoTable({
        startY: 90,
        head: [['Course', 'Grade']],
        body: body,
        theme: 'grid',
        headStyles: {
          fillColor: [0, 70, 140],
          textColor: 255,
          halign: 'center',
          fontStyle: 'bold',
          fontSize: 14
        },
        bodyStyles: {
          halign: 'center',
          fontSize: 12,
          cellPadding: 3
        },
        alternateRowStyles: {
          fillColor: [245, 247, 250]
        },
        columnStyles: {
          0: { cellWidth: 130 },
          1: { cellWidth: 40 }
        }
      });

      let y = doc.lastAutoTable.finalY + 20;

      doc.line(130, y, 190, y);
      doc.setFontSize(11);
      doc.text('Controller of Examinations Unit', 160, y + 8, { align: 'center' });

      const verifyLink = window.location.origin + '/verify.html?id=' + currentStudent.id;
      const qrImage = 'https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=' + encodeURIComponent(verifyLink);

      const qr = new Image();
      qr.crossOrigin = 'Anonymous';

      qr.onload = function() {
        doc.addImage(qr, 'PNG', 20, y - 10, 35, 35);
        doc.setFontSize(10);
        doc.text('Scan to Verify Result', 37, y + 30, { align: 'center' });

        doc.setFontSize(12);
        doc.text('BL = Failed bylaw (Failed in the written Exam)', 105, 260, { align: 'center' });

        let lineY = 275;
        doc.setDrawColor(0, 0, 0);
        doc.setLineWidth(0.3);
        doc.line(20, lineY, 190, lineY);

        doc.setFontSize(10);
        doc.setTextColor(0, 0, 0);
        doc.text('University of East Capital | Cairo – Egypt | www.uec.edu.eg | Hotline: 17523', 105, 280, { align: 'center' });

        doc.save(currentStudent.id + '_UEC_Result.pdf');
      };

      qr.onerror = function() {
        doc.setFontSize(12);
        doc.text('BL = Failed bylaw (Failed in the written Exam)', 105, 260, { align: 'center' });
        doc.save(currentStudent.id + '_UEC_Result.pdf');
      };

      qr.src = qrImage;
    }
  };

  logoReader.readAsDataURL(logoBlob);
}
</script>
</body>
</html>
