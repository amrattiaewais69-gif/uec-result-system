<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UEC Accountant Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{margin:0;background:#2f528f;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;}
.card{background:#eee;width:500px;border-radius:12px;padding:30px;text-align:center;}
.logo{width:90px;margin-bottom:10px;}
input,select{width:100%;padding:12px;margin:8px 0;border-radius:6px;border:1px solid #ccc;}
button{width:100%;padding:12px;margin-top:10px;background:#345a9d;border:none;color:white;border-radius:6px;cursor:pointer;font-size:15px;}
button:hover{background:#274a86;}
.studentPhoto{width:120px;height:120px;border-radius:50%;margin:auto;display:none;}
.footer{margin-top:30px;color:white;font-size:14px;text-align:center;}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="card" id="loginBox">
<img src="logo.png" class="logo">
<h2>🎓 University of East Capital</h2>
<p>Accountant Login</p>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- MAIN -->
<div class="card" id="mainBox" style="display:none">
<img src="logo.png" class="logo">
<h2>Record Appeal Payment</h2>
<p id="loggedUser" style="margin:5px 0;font-size:14px;color:#555;"></p>

<input id="studentId" placeholder="Student ID">
<button onclick="loadStudent()">Load Student</button>

<img id="photo" class="studentPhoto">
<input id="studentName" readonly placeholder="Student Name">

<select id="courseSelect"></select>
<input id="amount" placeholder="Payment Amount" value="300" readonly>

<button onclick="savePayment()">Save Payment</button>
<button onclick="exportPayments()">Export Payments Excel</button>
<button onclick="openChangePassword()">Change Password</button>
<button class="logout" onclick="logout()">Logout</button>
</div>

<div id="cpModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;justify-content:center;align-items:center;">
<div style="background:white;padding:25px;border-radius:10px;width:380px;text-align:center;">
<h3 style="margin-top:0;color:#345a9d;">Change Password</h3>
<input id="cpNew" type="password" placeholder="New Password" style="width:100%;padding:10px;margin:6px 0;border-radius:6px;border:1px solid #ccc;">
<input id="cpConfirm" type="password" placeholder="Confirm New Password" style="width:100%;padding:10px;margin:6px 0;border-radius:6px;border:1px solid #ccc;">
<div style="margin-top:12px;">
<button onclick="changePassword()" style="padding:10px 18px;background:#345a9d;color:white;border:none;border-radius:6px;cursor:pointer;">Save</button>
<button onclick="closeChangePassword()" style="padding:10px 18px;background:#777;color:white;border:none;border-radius:6px;cursor:pointer;margin-left:8px;">Cancel</button>
</div>
</div>
</div>

<div class="footer">
Designed by UEC ICT Department<br>
© 2026 University of East Capital
</div>

<script>
const API = window.location.origin + '/api';
let token = localStorage.getItem('accountToken');
let currentStudent = null;

if (!token) { location.href = 'login.html'; }

if (token) {
  document.getElementById('loginBox').style.display = 'none';
  document.getElementById('mainBox').style.display = 'block';
  document.getElementById('loggedUser').innerText = 'Logged in as: ' + (localStorage.getItem('accountUsername') || '');
}

async function login() {
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;

  const res = await fetch(API + '/auth/account-login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();

  if (res.ok && data.role === 'accountant') {
    token = data.token;
    localStorage.setItem('accountToken', token);
    localStorage.setItem('accountUsername', data.username);
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('mainBox').style.display = 'block';
    document.getElementById('loggedUser').innerText = 'Logged in as: ' + data.username;
  } else {
    alert('Invalid credentials or insufficient permissions');
  }
}

async function loadStudent() {
  const id = document.getElementById('studentId').value.trim();
  if (!id) { alert('Enter Student ID'); return; }

  const res = await fetch(API + '/account/student/' + id, {
    headers: { 'Authorization': 'Bearer ' + token }
  });

  const data = await res.json();

  if (res.ok) {
    currentStudent = data;
    document.getElementById('studentName').value = data.name;

    const photo = document.getElementById('photo');
    photo.src = 'https://amrattiaewais69-gif.github.io/student-results/photos/' + data.id + '.jpg';
    photo.onerror = function() { this.src = 'default-avatar.svg'; };
    photo.style.display = 'block';

    const select = document.getElementById('courseSelect');
    select.innerHTML = '';
    for (const course of Object.keys(data.courses)) {
      const option = document.createElement('option');
      option.value = course;
      option.text = course;
      select.appendChild(option);
    }
  } else {
    alert('Student not found');
  }
}

async function savePayment() {
  if (!currentStudent) { alert('Load student first'); return; }

  const course = document.getElementById('courseSelect').value;
  const amount = document.getElementById('amount').value;

  const res = await fetch(API + '/account/payment', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + token
    },
    body: JSON.stringify({ studentId: currentStudent.id, course, amount })
  });

  const data = await res.json();

  if (res.ok) {
    alert('Payment saved successfully');
    document.getElementById('amount').value = '300';
    loadStudent();
  } else {
    alert(data.error || 'Failed to save payment');
  }
}

async function exportPayments() {
  try {
    const res = await fetch(API + '/account/payments/export', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (!res.ok) { alert('Export failed'); return; }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'UEC_Payments.csv';
    a.click();
    URL.revokeObjectURL(url);
  } catch (err) {
    alert('Export failed');
  }
}

function logout() {
  localStorage.removeItem('accountToken');
  localStorage.removeItem('accountUsername');
  location.href = 'login.html';
}

function openChangePassword() { document.getElementById('cpModal').style.display = 'flex'; }
function closeChangePassword() { document.getElementById('cpModal').style.display = 'none'; }

async function changePassword() {
  const newPass = document.getElementById('cpNew').value.trim();
  const confirmPass = document.getElementById('cpConfirm').value.trim();
  if (!newPass || !confirmPass) { alert('Fill in all fields'); return; }
  if (newPass !== confirmPass) { alert('Passwords do not match'); return; }
  if (newPass.length < 4) { alert('Password must be at least 4 characters'); return; }

  try {
    const res = await fetch(API + '/auth/account-change-password', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ newPassword: newPass })
    });
    const data = await res.json();
    if (res.ok) {
      alert('Password updated. Please login again.');
      localStorage.removeItem('accountToken');
      localStorage.removeItem('accountUsername');
      location.href = 'login.html';
    } else {
      alert(data.error || 'Failed');
    }
  } catch (err) { alert('Error'); }
}
</script>
</body>
</html>
